<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kawai CX101 — Piano Maestro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300;1,500&family=Cinzel:wght@400;600&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090c;--bg2:#0e1018;--panel:#12141c;--panel2:#191c28;
  --border:rgba(180,150,80,.18);--gold:#c8a050;--gold2:#e8c870;--gold3:#8a6828;
  --ivory:#f0ead8;--ivory2:#c8c0a8;--ivory3:#786858;
  --green:#2ecc71;--red:#e74c3c;--blue:#3498db;
  --text:#d8d0b8;--dim:#686048;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Cormorant Garamond',serif;
  min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 100% 50% at 50% 0%,rgba(200,160,80,.07) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%,rgba(30,40,80,.3) 0%,transparent 60%);
}
.hdr{text-align:center;padding:2.2rem 1rem 1rem;position:relative;}
.hdr-brand{font-family:'IM Fell English SC',serif;font-size:.62rem;letter-spacing:.4em;color:var(--gold3);margin-bottom:.5rem;}
.hdr h1{font-family:'Cinzel',serif;font-size:clamp(1.5rem,4vw,2.5rem);font-weight:400;color:var(--gold2);letter-spacing:.06em;}
.hdr h1 span{color:var(--ivory2);font-weight:300;}
.hdr-line{width:220px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:.9rem auto 0;}
.app{max-width:1180px;margin:0 auto;padding:.5rem 1rem 4rem;display:grid;grid-template-columns:270px 1fr;gap:1rem;}
@media(max-width:840px){.app{grid-template-columns:1fr}}
.sidebar{display:flex;flex-direction:column;gap:.9rem;}
/* MIC */
.mic-card{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:1.1rem;}
.sec-title{font-family:'IM Fell English SC',serif;font-size:.58rem;letter-spacing:.3em;color:var(--gold3);margin-bottom:.8rem;}
.mic-btn{
  width:100%;padding:.65rem;background:transparent;border:1px solid var(--gold3);
  color:var(--gold2);font-family:'Cormorant Garamond',serif;font-size:1rem;
  letter-spacing:.1em;cursor:pointer;border-radius:2px;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
}
.mic-btn:hover{background:rgba(200,160,80,.1);border-color:var(--gold);}
.mic-btn.active{background:rgba(46,204,113,.08);border-color:var(--green);color:var(--green);}
.mic-btn.active .mdot{background:var(--green);animation:pulse 1s infinite;}
.mdot{width:9px;height:9px;border-radius:50%;background:var(--gold3);display:inline-block;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.35)}}
.det-wrap{margin-top:.9rem;text-align:center;}
.det-note{font-family:'Cinzel',serif;font-size:2rem;color:var(--ivory2);min-height:2.5rem;transition:all .12s;}
.det-note.match{color:var(--green);text-shadow:0 0 18px rgba(46,204,113,.5);}
.det-note.nomatch{color:var(--red);}
.det-freq{font-size:.78rem;color:var(--dim);letter-spacing:.1em;margin-top:.15rem;}
.conf-wrap{height:3px;background:var(--panel2);border-radius:2px;margin-top:.5rem;overflow:hidden;}
.conf-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--gold3),var(--gold));border-radius:2px;transition:width .08s;}
/* SCORE */
.score-card{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:1rem;display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.sc-item{text-align:center;}
.sc-val{font-family:'Cinzel',serif;font-size:1.7rem;color:var(--gold2);line-height:1;}
.sc-lbl{font-size:.56rem;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-top:.15rem;}
/* TABS */
.tabs{display:flex;gap:.3rem;}
.tab-btn{flex:1;background:var(--panel);border:1px solid var(--border);color:var(--ivory3);font-family:'Cormorant Garamond',serif;font-size:.85rem;letter-spacing:.06em;padding:.45rem .3rem;cursor:pointer;border-radius:2px;transition:all .2s;}
.tab-btn.active{background:rgba(200,160,80,.12);border-color:var(--gold);color:var(--gold2);}
/* LIST */
.lst{background:var(--panel);border:1px solid var(--border);border-radius:3px;max-height:320px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--gold3) var(--panel);}
.li{padding:.7rem .9rem;cursor:pointer;border-bottom:1px solid rgba(180,150,80,.08);transition:all .12s;display:flex;align-items:center;gap:.5rem;}
.li:last-child{border-bottom:none;}
.li:hover{background:rgba(200,160,80,.05);}
.li.active{background:rgba(200,160,80,.11);border-left:2px solid var(--gold);}
.li-num{font-family:'Cinzel',serif;font-size:.68rem;color:var(--dim);min-width:20px;}
.li-info{flex:1;}
.li-name{font-size:.9rem;color:var(--ivory2);line-height:1.2;}
.li-sub{font-size:.7rem;color:var(--dim);font-style:italic;margin-top:.08rem;}
.li-star{font-size:.75rem;}
/* MAIN */
.main{display:flex;flex-direction:column;gap:.9rem;}
.fb-banner{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:.85rem 1.3rem;display:flex;align-items:center;gap:.9rem;flex-wrap:wrap;}
.fb-icon{font-size:1.6rem;min-width:28px;text-align:center;}
.fb-txt{font-family:'Cinzel',serif;font-size:1rem;flex:1;color:var(--ivory2);transition:color .18s;}
.fb-txt.ok{color:var(--green);}
.fb-txt.bad{color:var(--red);}
.fb-txt.info{color:var(--ivory2);}
/* SHEET */
.sheet-card{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:1.1rem 1.3rem;}
.sh-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.9rem;gap:.8rem;flex-wrap:wrap;}
.sh-title{font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold2);}
.sh-comp{font-size:.75rem;font-style:italic;color:var(--dim);}
.sh-acts{display:flex;gap:.4rem;flex-wrap:wrap;}
.abtn{background:transparent;border:1px solid var(--gold3);color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:.82rem;letter-spacing:.08em;padding:.32rem .9rem;cursor:pointer;border-radius:2px;transition:all .2s;white-space:nowrap;}
.abtn:hover{background:rgba(200,160,80,.1);border-color:var(--gold);}
.abtn.primary{background:rgba(200,160,80,.14);border-color:var(--gold);color:var(--gold2);}
.score-scroll{overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--gold3) var(--panel2);}
canvas#sc{display:block;}
.notes-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:.7rem;}
.nchip{font-family:'Cinzel',serif;font-size:.7rem;padding:.22rem .45rem;border-radius:2px;border:1px solid var(--border);background:var(--panel2);color:var(--ivory3);transition:all .18s;min-width:32px;text-align:center;}
.nchip.cur{border-color:var(--gold);background:rgba(200,160,80,.14);color:var(--gold2);box-shadow:0 0 9px rgba(200,160,80,.3);}
.nchip.ok{border-color:var(--green);background:rgba(46,204,113,.1);color:var(--green);}
.nchip.bad{border-color:var(--red);background:rgba(231,76,60,.09);color:var(--red);}
.prog-wrap{height:2px;background:var(--panel2);border-radius:2px;overflow:hidden;margin-top:.55rem;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold));border-radius:2px;transition:width .35s;}
/* PIANO */
.piano-wrap{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:.9rem .9rem .4rem;}
.piano-inner-wrap{text-align:center;overflow-x:auto;}
.piano-inner{display:inline-flex;background:linear-gradient(180deg,#1e1a12 0%,#0a0808 100%);border:1px solid rgba(200,160,80,.2);border-radius:4px 4px 10px 10px;padding:10px 12px 0;box-shadow:0 20px 55px rgba(0,0,0,.8),0 0 40px rgba(200,160,80,.03);}
.og{position:relative;display:flex;}
.wk{width:36px;height:152px;background:linear-gradient(180deg,#f5f0e6 0%,#e8e3d5 70%,#d5d0c2 100%);border:1px solid #aaa;border-top:none;border-radius:0 0 5px 5px;cursor:pointer;position:relative;z-index:1;transition:background .05s,transform .05s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:7px;user-select:none;box-shadow:inset 0 -2px 4px rgba(0,0,0,.1),1px 0 0 rgba(0,0,0,.06);}
.wk:hover{background:linear-gradient(180deg,#fff 0%,#f5f0e6 100%);}
.wk.pressed,.wk:active{background:linear-gradient(180deg,#e2ddd0 0%,#d0cbb8 100%);transform:scaleY(.998) translateY(1px);}
.wk.hl{background:linear-gradient(180deg,#fff8cc 0%,#f0d860 100%);border-color:var(--gold);box-shadow:0 0 16px rgba(200,160,80,.6),inset 0 -2px 4px rgba(0,0,0,.1);}
.wk.fok{background:linear-gradient(180deg,#c0f0c0 0%,#70d870 100%)!important;box-shadow:0 0 22px rgba(46,204,113,.7)!important;}
.wk.fbad{background:linear-gradient(180deg,#f0c0c0 0%,#d87070 100%)!important;box-shadow:0 0 22px rgba(231,76,60,.7)!important;}
.wk-lbl{font-size:8px;color:#888;font-family:'Cormorant Garamond',serif;pointer-events:none;}
.bk{width:22px;height:94px;background:linear-gradient(180deg,#252018 0%,#151008 70%,#0a0805 100%);border:1px solid #000;border-top:none;border-radius:0 0 4px 4px;cursor:pointer;position:absolute;z-index:2;top:10px;transition:background .05s;box-shadow:2px 4px 8px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.04);user-select:none;}
.bk:hover{background:linear-gradient(180deg,#352818 0%,#251808 100%);}
.bk.pressed,.bk:active{background:#0a0808;transform:translateY(2px);}
.bk.hl{background:linear-gradient(180deg,#5a4820 0%,#3a3010 100%);box-shadow:0 0 16px rgba(200,160,80,.6),2px 4px 8px rgba(0,0,0,.9);}
.bk.fok{background:linear-gradient(180deg,#0f4518 0%,#082808 100%)!important;box-shadow:0 0 22px rgba(46,204,113,.8)!important;}
.bk.fbad{background:linear-gradient(180deg,#451010 0%,#280808 100%)!important;box-shadow:0 0 22px rgba(231,76,60,.8)!important;}
.kbd-hint{text-align:center;font-size:.7rem;color:var(--dim);padding:.3rem;letter-spacing:.04em;margin-top:.5rem;}
.float-sym{position:fixed;pointer-events:none;font-family:'Cinzel',serif;font-size:1.4rem;opacity:1;animation:fup 1s ease-out forwards;z-index:9999;}
@keyframes fup{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-65px) scale(.45)}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">Kawai CX101 — İnteraktif Piano Eğitimi</div>
  <h1>Piano <span>Maestro</span></h1>
  <div class="hdr-line"></div>
</div>

<div class="app">
<!-- ═══ SIDEBAR ═══ -->
<div class="sidebar">

  <div class="mic-card">
    <div class="sec-title">Mikrofon — Gerçek Zamanlı Perde Algılama</div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
      <span class="mdot" id="mdot"></span>
      <span id="micTxt">Mikrofonu Aç</span>
    </button>
    <div class="det-wrap">
      <div class="det-note" id="detNote">—</div>
      <div class="det-freq" id="detFreq">Nota bekleniyor...</div>
      <div class="conf-wrap"><div class="conf-bar" id="confBar"></div></div>
    </div>
  </div>

  <div class="score-card">
    <div class="sc-item"><div class="sc-val" id="sv0">0</div><div class="sc-lbl">Puan</div></div>
    <div class="sc-item"><div class="sc-val" id="sv1">0</div><div class="sc-lbl">Seri 🔥</div></div>
    <div class="sc-item"><div class="sc-val" id="sv2">0</div><div class="sc-lbl">Doğru ✓</div></div>
    <div class="sc-item"><div class="sc-val" id="sv3">0</div><div class="sc-lbl">Yanlış ✗</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabA" onclick="switchTab('lessons')">📚 Dersler</button>
    <button class="tab-btn" id="tabB" onclick="switchTab('pieces')">🎵 Besteler</button>
  </div>

  <div class="lst" id="lst"></div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">

  <div class="fb-banner">
    <div class="fb-icon" id="fbI">🎹</div>
    <div class="fb-txt info" id="fbT">Soldaki listeden bir ders veya beste seç, ardından mikrofonu aç</div>
  </div>

  <div class="sheet-card">
    <div class="sh-hdr">
      <div>
        <div class="sh-title" id="shTitle">—</div>
        <div class="sh-comp" id="shComp"></div>
      </div>
      <div class="sh-acts">
        <button class="abtn" onclick="playDemo()">♪ Dinle</button>
        <button class="abtn primary" onclick="startGame()">▶ Başlat</button>
        <button class="abtn" onclick="resetGame()">↺ Sıfırla</button>
      </div>
    </div>
    <div class="score-scroll"><canvas id="sc" width="880" height="118"></canvas></div>
    <div class="notes-row" id="nrow"></div>
    <div class="prog-wrap"><div class="prog-bar" id="pgBar" style="width:0%"></div></div>
  </div>

  <div class="piano-wrap">
    <div class="piano-inner-wrap">
      <div class="piano-inner" id="pianoInner"></div>
    </div>
    <div class="kbd-hint">Klavye: <b>A S D F G H J</b> = Do Re Mi Fa Sol La Si (4. oktav)</div>
  </div>

</div>
</div>

/* ─── NOTE SYSTEM ─── */
const EN=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const TR={C:'Do','C#':'Do#',D:'Re','D#':'Re#',E:'Mi',F:'Fa','F#':'Fa#',G:'Sol','G#':'Sol#',A:'La','A#':'La#',B:'Si'};
const WHITE=['C','D','E','F','G','A','B'];
const BKO={'C#':0,'D#':1,'F#':3,'G#':4,'A#':5};

function midiOf(n,o){return(o+1)*12+EN.indexOf(n);}
function freqOf(n,o){return 440*Math.pow(2,(midiOf(n,o)-69)/12);}
function noteFromFreq(f){
  if(f<40||f>2000)return null;
  const m=Math.round(12*Math.log2(f/440)+69);
  return{note:EN[((m%12)+12)%12],octave:Math.floor(m/12)-1,midi:m};
}

/* ─── AUDIO ─── */
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(f,dur=1,vol=0.42){
  const ctx=getCtx();
  const o=ctx.createOscillator(),g=ctx.createGain();
  const o2=ctx.createOscillator(),g2=ctx.createGain();
  o.type='triangle';o.frequency.value=f;
  o2.type='sine';o2.frequency.value=f*2;g2.gain.value=vol*.1;
  g.gain.setValueAtTime(0,ctx.currentTime);
  g.gain.linearRampToValueAtTime(vol,ctx.currentTime+.012);
  g.gain.exponentialRampToValueAtTime(vol*.5,ctx.currentTime+.28);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
  o.connect(g);o2.connect(g2);g.connect(ctx.destination);g2.connect(ctx.destination);
  o.start();o2.start();o.stop(ctx.currentTime+dur+.05);o2.stop(ctx.currentTime+dur+.05);
}

/* ─── MIC / PITCH ─── */
async function toggleMic(){
  if(micOn){stopMic();return;}
  try{
    const ctx=getCtx();
    if(ctx.state==='suspended')await ctx.resume();
    const stream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}
    });
    micStream=stream;
    analyser=ctx.createAnalyser();
    analyser.fftSize=4096;
    analyser.smoothingTimeConstant=0.15;
    micSrc=ctx.createMediaStreamSource(stream);
    micSrc.connect(analyser);
    micOn=true;
    document.getElementById('micBtn').classList.add('active');
    document.getElementById('micTxt').textContent='Mikrofon Açık — Dinleniyor';
    pitchLoop();
  }catch(e){
    setFb('❌','Mikrofon erişimi reddedildi: '+e.message,'bad');
  }
}
function stopMic(){
  micOn=false;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(micSrc){micSrc.disconnect();micSrc=null;}
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  analyser=null;
  document.getElementById('micBtn').classList.remove('active');
  document.getElementById('micTxt').textContent='Mikrofonu Aç';
  document.getElementById('detNote').textContent='—';
  document.getElementById('detFreq').textContent='Nota bekleniyor...';
  document.getElementById('confBar').style.width='0%';
}

const tmpBuf=()=>new Float32Array(analyser?analyser.fftSize:4096);
function pitchLoop(){
  const buf=tmpBuf();
  (function loop(){
    if(!micOn)return;
    rafId=requestAnimationFrame(loop);
    analyser.getFloatTimeDomainData(buf);
    const{pitch,conf}=autoCorr(buf,getCtx().sampleRate);
    onPitch(pitch,conf);
  })();
}

function autoCorr(buf,sr){
  let rms=0;for(let i=0;i<buf.length;i++)rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/buf.length);
  if(rms<0.012)return{pitch:-1,conf:0};
  let r1=0,r2=buf.length-1;
  for(let i=0;i<buf.length/2;i++){if(buf[i]<0){r1=i;break;}}
  for(let i=1;i<buf.length/2;i++){if(buf[buf.length-i]<0){r2=buf.length-i;break;}}
  const t=buf.slice(r1,r2);const n=t.length;
  if(n<8)return{pitch:-1,conf:0};
  const c=new Float32Array(n);
  for(let i=0;i<n;i++)for(let j=0;j<n-i;j++)c[i]+=t[j]*t[j+i];
  let d=0;while(d<n&&c[d]>c[d+1])d++;
  let mx=-Infinity,mp=-1;
  for(let i=d;i<n;i++){if(c[i]>mx){mx=c[i];mp=i;}}
  if(mp<=0||c[0]===0)return{pitch:-1,conf:0};
  const y1=c[mp-1]||0,y2=c[mp],y3=c[mp+1]||0;
  const a=(y1+y3-2*y2)*.5,b=(y3-y1)*.5;
  const ref=a?mp-b/(2*a):mp;
  return{pitch:sr/ref,conf:Math.min(1,mx/c[0])};
}

function onPitch(pitch,conf){
  document.getElementById('confBar').style.width=(conf*100)+'%';
  if(pitch<50||pitch>1600||conf<0.88)return;
  pitchHist.push(pitch);if(pitchHist.length>6)pitchHist.shift();
  const avg=pitchHist.reduce((a,b)=>a+b,0)/pitchHist.length;
  const det=noteFromFreq(avg);if(!det)return;
  const nEl=document.getElementById('detNote');
  const fEl=document.getElementById('detFreq');
  fEl.textContent=`${det.note}${det.octave} — ${avg.toFixed(1)} Hz  |  güven: ${Math.round(conf*100)}%`;

  if(started&&qIdx<queue.length){
    const tgt=queue[qIdx];
    const ok=(det.note===tgt.n&&det.octave===tgt.o);
    nEl.className='det-note '+(ok?'match':'nomatch');
    nEl.textContent=(TR[det.note]||det.note)+det.octave;
    const now=Date.now();
    if(ok&&now-lastOkTime>550){lastOkTime=now;doCorrect();}
    else if(!ok&&conf>0.92&&now-lastBadTime>750){lastBadTime=now;doWrong(det);}
  }else{
    nEl.className='det-note';
    nEl.textContent=(TR[det.note]||det.note)+det.octave;
  }
}

/* ─── GAME ─── */
function doCorrect(){
  if(qIdx>=queue.length)return;
  const t=queue[qIdx];
  results[qIdx]='ok';
  pts+=10+streak*3;streak++;cor++;
  updScore();
  flashK(t.n,t.o,'fok');
  spawnFloat('✓',t.n,t.o,'#2ecc71');
  const msgs=['Harika!','Mükemmel! 🎶','Süper! ✨','Bravo!','Tam isabet! 🎯','Enfes!','Evet!'];
  setFb('✅',msgs[Math.floor(Math.random()*msgs.length)],'ok');
  qIdx++;updProg();drawSc();
  if(qIdx>=queue.length)setTimeout(complete,500);
}
function doWrong(det){
  if(qIdx>=queue.length||results[qIdx]==='ok')return;
  if(results[qIdx]==='bad')return; // already counted
  results[qIdx]='bad';
  streak=0;wrg++;updScore();
  flashK(det.note,det.octave,'fbad');
  spawnFloat('✗',det.note,det.octave,'#e74c3c');
  const t=queue[qIdx];
  setFb('❌',`Yanlış nota! ${TR[det.note]||det.note}${det.octave} ≠ Hedef: ${TR[t.n]||t.n}${t.o}`,'bad');
}
function complete(){
  started=false;
  const pct=cor+wrg>0?Math.round(cor/(cor+wrg)*100):100;
  setFb('🏆',`Tamamlandı! ${pts} puan · Doğruluk: %${pct} · Seri: ${streak}`,'ok');
  clearHl();
}
function startGame(){
  if(!queue.length){setFb('⚠️','Önce bir ders veya beste seç!','bad');return;}
  started=true;qIdx=0;pts=0;streak=0;cor=0;wrg=0;
  results=queue.map(()=>'pending');
  lastOkTime=0;lastBadTime=0;
  updScore();updProg();drawSc();
  clearHl();hlK(queue[0].n,queue[0].o);
  setFb(micOn?'🎤':'🎹',micOn?'Çalmaya başla! İlk nota: '+(TR[queue[0].n]||queue[0].n)+queue[0].o:'Mikrofonu aç ve çalmaya başla!','info');
}
function resetGame(){
  started=false;qIdx=0;pts=0;streak=0;cor=0;wrg=0;
  results=queue.map(()=>'pending');
  updScore();updProg();drawSc();clearHl();
  if(queue.length)hlK(queue[0].n,queue[0].o);
  setFb('🎹','Sıfırlandı. Başlat\'a bas.','info');
}
function updScore(){
  document.getElementById('sv0').textContent=pts;
  document.getElementById('sv1').textContent=streak;
  document.getElementById('sv2').textContent=cor;
  document.getElementById('sv3').textContent=wrg;
}
function updProg(){
  const p=queue.length?qIdx/queue.length*100:0;
  document.getElementById('pgBar').style.width=p+'%';
  buildNrow();clearHl();if(qIdx<queue.length)hlK(queue[qIdx].n,queue[qIdx].o);
}

/* ─── SCORE CANVAS ─── */
const SPOS={
  'C3':-7,'D3':-6,'E3':-5,'F3':-4,'G3':-3,'A3':-2,'B3':-1,
  'C4':0,'D4':1,'E4':2,'F4':3,'G4':4,'A4':5,'B4':6,
  'C5':7,'D5':8,'E5':9,'F5':10,'G5':11,'A5':12,'B5':13,
  'C6':14,'D6':15
};
function sp(n,o){const k=n.replace('#','')+o;return SPOS[k]!==undefined?SPOS[k]:0;}

function drawSc(){
  const cv=document.getElementById('sc'),ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='rgba(18,20,28,.9)';ctx.fillRect(0,0,W,H);
  const sT=22,lG=12,nL=5;
  ctx.strokeStyle='rgba(180,150,80,.3)';ctx.lineWidth=1;
  for(let i=0;i<nL;i++){ctx.beginPath();ctx.moveTo(28,sT+i*lG);ctx.lineTo(W-8,sT+i*lG);ctx.stroke();}
  ctx.fillStyle='rgba(200,160,80,.65)';ctx.font='60px serif';ctx.fillText('𝄞',0,sT+nL*lG-2);
  if(!queue.length)return;
  const show=Math.min(queue.length,24),si=Math.max(0,qIdx-4);
  const xS=56,xG=Math.min(34,(W-xS-10)/show);
  const bY=sT+(nL-1)*lG;
  for(let i=0;i<show;i++){
    const qi=si+i;if(qi>=queue.length)break;
    const item=queue[qi],x=xS+i*xG;
    const pos=sp(item.n,item.o),ny=bY-pos*(lG/2);
    // Ledger lines
    ctx.strokeStyle='rgba(180,150,80,.35)';ctx.lineWidth=1;
    if(ny>bY+3)for(let ly=bY+lG;ly<=ny+3;ly+=lG){ctx.beginPath();ctx.moveTo(x-8,ly);ctx.lineTo(x+8,ly);ctx.stroke();}
    if(ny<sT-3)for(let ly=sT-lG;ly>=ny-3;ly-=lG){ctx.beginPath();ctx.moveTo(x-8,ly);ctx.lineTo(x+8,ly);ctx.stroke();}
    let fill=qi===qIdx?'#e8c870':results[qi]==='ok'?'#2ecc71':results[qi]==='bad'?'#e74c3c':'rgba(200,180,140,.35)';
    ctx.fillStyle=fill;
    ctx.beginPath();ctx.ellipse(x,ny,5.5,4,-0.25,0,Math.PI*2);ctx.fill();
    if(item.n.includes('#')){ctx.font='10px serif';ctx.fillText('♯',x-14,ny+4);}
    ctx.strokeStyle=fill;ctx.lineWidth=1.4;ctx.beginPath();
    if(pos>=2){ctx.moveTo(x-4.5,ny);ctx.lineTo(x-4.5,ny+26);}
    else{ctx.moveTo(x+4.5,ny);ctx.lineTo(x+4.5,ny-26);}
    ctx.stroke();
    ctx.fillStyle='rgba(180,150,80,.45)';ctx.font='8px Cinzel,serif';ctx.textAlign='center';
    ctx.fillText(TR[item.n]||item.n,x,H-3);ctx.textAlign='left';
  }
}

/* ─── NOTES ROW ─── */
function buildNrow(){
  const row=document.getElementById('nrow');row.innerHTML='';
  const show=Math.min(queue.length,28),start=Math.max(0,qIdx-4);
  for(let i=start;i<start+show&&i<queue.length;i++){
    const c=document.createElement('span');c.className='nchip';
    if(i===qIdx)c.classList.add('cur');
    else if(results[i]==='ok')c.classList.add('ok');
    else if(results[i]==='bad')c.classList.add('bad');
    c.textContent=(TR[queue[i].n]||queue[i].n)+queue[i].o;
    row.appendChild(c);
  }
}

  activeTab=t;
  document.getElementById('tabA').classList.toggle('active',t==='lessons');
  document.getElementById('tabB').classList.toggle('active',t==='pieces');
  buildList();
}
function buildList(){
  const el=document.getElementById('lst');el.innerHTML='';
  const src=activeTab==='lessons'?LESSONS:PIECES;
  src.forEach((item,i)=>{
    const d=document.createElement('div');d.className='li';
    const stars=activeTab==='pieces'?'⭐'.repeat(Math.ceil((i+1)/7)):'';
    const sub=activeTab==='lessons'?item.sub:item.comp;
    d.innerHTML=`<span class="li-num">${i+1}</span><div class="li-info"><div class="li-name">${item.name}</div><div class="li-sub">${sub}</div></div><span class="li-star">${stars}</span>`;
    d.onclick=()=>selectItem(item,i,activeTab);
    el.appendChild(d);
  });
}
function selectItem(item,idx,type){
  document.querySelectorAll('.li').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.li')[idx]?.classList.add('active');
  started=false;curType=type;curItem=item;
  if(type==='lessons'){
    queue=item.type==='random'?shuffle([...item.items,...item.items,...item.items]).slice(0,16):[...item.items].map(x=>({n:x.n,o:x.o,d:300}));
  }else{
    queue=item.notes.map(x=>({n:x.n,o:x.o,d:x.d||300}));
  }
  qIdx=0;results=queue.map(()=>'pending');
  pts=0;streak=0;cor=0;wrg=0;
  updScore();
  document.getElementById('shTitle').textContent=item.name;
  document.getElementById('shComp').textContent=type==='lessons'?item.sub:item.comp;
  drawSc();buildNrow();
  document.getElementById('pgBar').style.width='0%';
  clearHl();if(queue.length)hlK(queue[0].n,queue[0].o);
  setFb(type==='pieces'?'🎵':'📚','"♪ Dinle" ile önizle ya da "▶ Başlat"a bas. Mikrofona çal!','info');
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ─── PIANO ─── */
const SHOCTS=[3,4,5,6];
function buildPiano(){
  const inner=document.getElementById('pianoInner');inner.innerHTML='';
  SHOCTS.forEach(oct=>{
    const g=document.createElement('div');g.className='og';
    WHITE.forEach(wn=>{
      const k=document.createElement('div');k.className='wk';k.id='k_'+wn+oct;
      const l=document.createElement('span');l.className='wk-lbl';l.textContent=TR[wn];k.appendChild(l);
      k.addEventListener('mousedown',()=>onKey(wn,oct));
      k.addEventListener('touchstart',e=>{e.preventDefault();onKey(wn,oct);},{passive:false});
      g.appendChild(k);
    });
    Object.entries(BKO).forEach(([bn,pos])=>{
      const k=document.createElement('div');k.className='bk';k.id='k_'+bn+oct;
      k.style.left=(pos*36+36-11)+'px';
      k.addEventListener('mousedown',()=>onKey(bn,oct));
      k.addEventListener('touchstart',e=>{e.preventDefault();onKey(bn,oct);},{passive:false});
      g.appendChild(k);
    });
    inner.appendChild(g);
  });
}
function onKey(note,oct){
  playTone(freqOf(note,oct),.85,.44);
  flashK(note,oct,'pressed');
  if(!started||qIdx>=queue.length)return;
  const t=queue[qIdx];
  if(note===t.n&&oct===t.o){lastOkTime=Date.now();doCorrect();}
  else{lastBadTime=Date.now();doWrong({note,octave:oct});}
}
function hlK(n,o){const e=document.getElementById('k_'+n+o);if(e)e.classList.add('hl');}
function clearHl(){document.querySelectorAll('.hl').forEach(e=>e.classList.remove('hl'));}
function flashK(n,o,cls){
  const e=document.getElementById('k_'+n+o);if(!e)return;
  e.classList.add(cls);setTimeout(()=>e.classList.remove(cls),360);
}

/* ─── KEYBOARD ─── */
const KBM={a:'C',s:'D',d:'E',f:'F',g:'G',h:'A',j:'B'};
document.addEventListener('keydown',e=>{if(!e.repeat){const n=KBM[e.key.toLowerCase()];if(n)onKey(n,4);}});

/* ─── FLOAT ─── */
function spawnFloat(sym,note,oct,color){
  const el=document.getElementById('k_'+note+oct);if(!el)return;
  const r=el.getBoundingClientRect();
  const d=document.createElement('div');d.className='float-sym';d.textContent=sym;
  d.style.color=color;d.style.left=(r.left+r.width/2-10)+'px';d.style.top=(r.top-4)+'px';
  document.body.appendChild(d);setTimeout(()=>d.remove(),1050);
}

/* ─── FEEDBACK ─── */
function setFb(icon,text,cls){
  document.getElementById('fbI').textContent=icon;
  const t=document.getElementById('fbT');t.textContent=text;t.className='fb-txt '+cls;
}

/* ─── INIT ─── */
buildPiano();
buildList();
</script>
</body>
</html>
