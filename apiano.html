<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

        body { margin: 0; overflow: hidden; background-color: #050505; color: white; font-family: -apple-system, sans-serif; touch-action: none; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        #ui { position: absolute; top: 15px; left: 15px; z-index: 10; background: rgba(15,15,15,0.9); padding: 15px; border-radius: 12px; border: 1px solid #444; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h3 { margin: 0 0 15px 0; color: #00ffff; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; }
        select, button, input { width: 100%; background: #222; color: white; border: 1px solid #555; padding: 12px; margin-top: 8px; border-radius: 6px; font-size: 15px; }
        button { background: #3a2066; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { background: #b088ff; color: black; cursor: pointer; }
        .btn-green { background: #28a745; }
        .btn-green:hover { background: #34d058; }
        
        #debug-panel { margin-top: 15px; padding: 12px; background: rgba(0, 255, 0, 0.05); border: 1px solid #00ff00; border-radius: 6px; font-family: monospace; font-size: 13px; color: #00ff00; }
        #detected-notes { font-size: 20px; font-weight: bold; margin-top: 8px; color: #fff; min-height: 25px; word-wrap: break-word; }
        
        .control-group { margin-top: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 6px; border: 1px solid #333; }
        .control-group label { font-size: 12px; color: #ccc; display: flex; justify-content: space-between; align-items: center; }
        
        /* Checkbox switch stili */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00ffff; }
        input:checked + .slider:before { transform: translateX(20px); }

        @media (orientation: landscape) { #ui { max-height: 90vh; overflow-y: auto; } }
    </style>
</head>

    function updateSensitivity(val) {

    async function initAudio() {
        try {
            // Audio Context oluştur ve Safari için "resume" et
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') await audioCtx.resume();

            const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 16384; 
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            isListening = true;
            
            document.getElementById('startMicBtn').innerText = "✅ Dinleme Aktif";
            document.getElementById('startMicBtn').style.background = "#28a745";
            detectPitch(); 
        } catch (err) {
            alert("Mikrofon izni verilmedi veya Safari ayarlarında mikrofon kapalı.");
        }
    }

    function detectPitch() {
        if (!isListening) return;
        requestAnimationFrame(detectPitch);
        analyser.getByteFrequencyData(dataArray);
        let nyquist = audioCtx.sampleRate / 2;
        
        let peaks = [];
        for (let i = 2; i < dataArray.length - 2; i++) {
            let val = dataArray[i];
            if (val > sensitivityThreshold && val > dataArray[i-1] && val > dataArray[i+1]) {
                peaks.push({ freq: i * (nyquist / dataArray.length), amp: val });
            }
        }
        
        peaks.sort((a, b) => b.amp - a.amp);
        let topPeaks = peaks.slice(0, 5);
        let activeThisFrame = {};
        let fundamentals = [];
        let detectedNames = [];

        for (let p of topPeaks) {
            let isHarmonic = false;
            for (let f of fundamentals) {
                let ratio = p.freq / f.freq;
                if (Math.abs(ratio - Math.round(ratio)) < 0.05) { isHarmonic = true; break; }
            }
            if (!isHarmonic && p.freq > 27 && p.freq < 4000) {
                fundamentals.push(p);
                let midiNote = freqToMidi(p.freq);
                activeThisFrame[midiNote] = true;
                noteDecayBuffer[midiNote] = 12; 
                detectedNames.push(getNoteName(midiNote));
            }
        }

        const notesDisplay = document.getElementById('detected-notes');
        if(detectedNames.length > 0) {
            notesDisplay.innerText = detectedNames.join(" | ");
            notesDisplay.style.color = "#00ffff";
        } else {
            notesDisplay.innerText = "---";
            notesDisplay.style.color = "#444";
        }

        activeNotes = {};
        for (let note in noteDecayBuffer) {
            if (noteDecayBuffer[note] > 0) {
                activeNotes[note] = true;
                if (!activeThisFrame[note]) noteDecayBuffer[note]--;
                else noteDecayBuffer[note] = 12; 
            }
        }
    }

    // --- GÖRSEL ÇİZİMLER ---
    function getNoteX(pitch, isBlack) {
        let wIndex = 0;
        for(let i=startKey; i<pitch; i++) {
            if(![1, 3, 6, 8, 10].includes(i % 12)) wIndex++;
        }
        return isBlack ? (wIndex * whiteKeyWidth) - (blackKeyWidth / 2) : wIndex * whiteKeyWidth;
    }

    function createSparks(x, y, color) {
        for(let i=0; i<4; i++) {
            particles.push({
                x: x + (Math.random() * whiteKeyWidth), y: y,
                vx: (Math.random() - 0.5) * 5, vy: -Math.random() * 6 - 2,
                life: 1.0, color: color
            });
        }
    }

    function drawParticles() {
        for(let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath();
            ctx.arc(p.x, p.y, Math.random() * 2 + 1, 0, Math.PI * 2); ctx.fill();
            p.x += p.vx; p.y += p.vy; p.life -= 0.05;
            if(p.life <= 0) particles.splice(i, 1);
        }
        ctx.globalAlpha = 1.0;
    }

        let whiteIndex = 0;
        for (let i = startKey; i <= endKey; i++) {
            if (![1, 3, 6, 8, 10].includes(i % 12)) {
                let x = whiteIndex * whiteKeyWidth;
                if(activeNotes[i]) {
                    ctx.fillStyle = '#fff'; ctx.fillRect(x, yOffset, whiteKeyWidth, whiteKeyHeight);
                    ctx.shadowBlur = 20; ctx.shadowColor = themeColor; ctx.fillStyle = themeColor;
                    ctx.fillRect(x, yOffset + whiteKeyHeight - 20, whiteKeyWidth, 20); ctx.shadowBlur = 0;
                    if(Math.random() > 0.5) createSparks(x, yOffset, themeColor);
                } else {
                    ctx.fillStyle = '#e8e8e8'; ctx.fillRect(x, yOffset, whiteKeyWidth - 1, whiteKeyHeight);
                }
                whiteIndex++;
            }
        }

        whiteIndex = 0;
        for (let i = startKey; i <= endKey; i++) {
            if ([1, 3, 6, 8, 10].includes(i % 12)) {
                let x = (whiteIndex * whiteKeyWidth) - (blackKeyWidth / 2);
                if(activeNotes[i]) {
                    ctx.fillStyle = themeColor; ctx.fillRect(x, yOffset, blackKeyWidth, blackKeyHeight);
                    ctx.shadowBlur = 15; ctx.shadowColor = themeColor; ctx.fillStyle = '#fff';
                    ctx.fillRect(x + 2, yOffset + blackKeyHeight - 15, blackKeyWidth - 4, 15); ctx.shadowBlur = 0;
                    if(Math.random() > 0.5) createSparks(x, yOffset, '#ffffff');
                } else {
                    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(x, yOffset, blackKeyWidth, blackKeyHeight);
                    ctx.fillStyle = '#333'; ctx.fillRect(x + 2, yOffset + 2, blackKeyWidth - 4, blackKeyHeight - 10);
                }
            } else { whiteIndex++; }
        }
    }

    function drawFallingNotes() {
        let pianoTopY = canvas.height - whiteKeyHeight;

        currentSong.forEach(note => {
            let yPos = pianoTopY - ((note.start - songTime) * speed);
            let noteHeight = Math.max(25, note.duration * speed); 

            // Ekranda mı?
            if (yPos + noteHeight > 0 && yPos - noteHeight < canvas.height) {
                let isBlack = [1, 3, 6, 8, 10].includes(note.pitch % 12);
                let xPos = getNoteX(note.pitch, isBlack);
                let width = isBlack ? blackKeyWidth : whiteKeyWidth - 1;
                
                // Audio Çalma Mantığı (Ses Aktifse ve Zamanı Geldiyse)
                if (isPlaying && songTime >= note.start && !note.played) {
                    playSynthNote(note.pitch, note.duration);
                    note.played = true; // Sadece 1 kere çalması için işaretle
                }

                // Çizim
                let gradient = ctx.createLinearGradient(0, yPos - noteHeight, 0, yPos);
                gradient.addColorStop(0, 'rgba(0, 255, 255, 0.4)'); 
                gradient.addColorStop(1, 'rgba(0, 255, 255, 1)');   

                ctx.fillStyle = gradient;
                ctx.shadowBlur = 8; ctx.shadowColor = themeColor;
                ctx.beginPath(); ctx.roundRect(xPos, yPos - noteHeight, width, noteHeight, 6); ctx.fill();
                ctx.shadowBlur = 0; 
                
                // NOTA İSİMLERİNİ BÜYÜK YAZDIRMA
                ctx.fillStyle = isBlack ? '#ffffff' : '#000000'; 
                ctx.font = 'bold 15px -apple-system, Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                if (width > 20) { 
                    ctx.fillText(getNoteName(note.pitch), xPos + (width / 2), yPos - 15);
                }
            }
        });
    }

    // --- ZAMANLAMAYI (FRAME RATE) CİHAZDAN BAĞIMSIZ YAPMA YÖNTEMİ ---
    function animate() {
        let now = performance.now();
        let deltaTime = (now - lastFrameTime) / 1000; // Saniye cinsinden geçen süre
        lastFrameTime = now;

        ctx.fillStyle = 'rgba(8, 8, 8, 0.5)'; // Hareket izi bırakan karanlık arkaplan
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (isPlaying) songTime += deltaTime; 

        drawFallingNotes();
        drawPiano();
        drawParticles(); 
        
        requestAnimationFrame(animate);
    }

    function startSong() {
        // Ses modülü uyku modundaysa uyandır (Safari politikası gereği)
        if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        else if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        let selection = document.getElementById('songSelect').value;
        currentSong = songLibrary[selection];
        
        // Çalma bayraklarını (played) sıfırla
        currentSong.forEach(n => n.played = false);
        
        songTime = -3; 
        lastFrameTime = performance.now(); // Zamanlayıcıyı resetle
        isPlaying = true;
        
        const content = document.getElementById('ui-content');
        if(content.style.display !== 'none') toggleUI();
    }

    requestAnimationFrame(animate);
</script>
