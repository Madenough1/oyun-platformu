<!DOCTYPE html>
<html lang="tr">
<head>

    <title>Kawai CX-101 Pro - V4 DSP Sürümü</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: white; font-family: -apple-system, sans-serif; touch-action: none; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(10,10,10,0.85); padding: 15px; border-radius: 12px; border: 1px solid #444; width: 300px; backdrop-filter: blur(10px); transition: opacity 0.3s; }
        h3 { margin-top: 0; margin-bottom: 10px; color: #00ffff; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 5px; cursor: pointer; }
        select, button, input { width: 100%; background: #222; color: white; border: 1px solid #555; padding: 10px; margin-top: 8px; border-radius: 6px; font-size: 14px; }
        button { background: #0088ff; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { background: #00ffff; color: black; cursor: pointer; }
        
        /* Yeni: Canlı Analiz Ekranı */
        #debug-panel { margin-top: 15px; padding: 10px; background: rgba(0, 255, 0, 0.1); border: 1px solid #00ff00; border-radius: 6px; font-family: monospace; font-size: 12px; color: #00ff00; }
        #detected-notes { font-size: 18px; font-weight: bold; margin-top: 5px; color: #fff; min-height: 25px; }
        
        .control-group { margin-top: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 6px; border: 1px solid #333; }
        .control-group label { font-size: 12px; color: #ccc; display: flex; justify-content: space-between; }
        
        @media (orientation: landscape) {
            #ui { max-height: 85vh; overflow-y: auto; }
        }
    </style>
</head>
<body>

    <div id="ui">
        <h3 onclick="toggleUI()">🎹 Menü & Kontroller (Tıkla Gizle)</h3>
        <div id="ui-content">
            <select id="songSelect">
                <option value="furElise">Für Elise (Uzun Versiyon)</option>
                <option value="interstellar">Interstellar (Uzun Versiyon)</option>
            </select>
            
            <button id="startMicBtn" onclick="initAudio()">🎙️ Akustik Dinlemeyi Başlat</button>
            <button onclick="startSong()" style="background: #28a745;">▶️ Animasyonu Başlat</button>
            
            <div class="control-group">
                <label><span>Hassasiyet (Gürültü Filtresi)</span> <span id="sensValue">200</span></label>
                <input type="range" id="sensitivity" min="50" max="250" value="200" oninput="updateSensitivity(this.value)">
                <div style="font-size: 10px; color: #888; margin-top: 5px;">* Odadaki yankıyı kesmek için bu değeri artırın.</div>
            </div>

            <div id="debug-panel">
                <div>📡 iPad'in Duyduğu Notalar:</div>
                <div id="detected-notes">- Bekleniyor -</div>
            </div>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="pianoCanvas"></canvas>
    </div>

    const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    function getNoteName(midiVal) {
        let name = noteNames[midiVal % 12];
        let octave = Math.floor(midiVal / 12) - 1;
        return name + octave;
    }

    let whiteKeyWidth, whiteKeyHeight, blackKeyWidth, blackKeyHeight;
    const startKey = 40; // E2
    const endKey = 80;   // G5
    const totalVisibleWhiteKeys = 24;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let isLandscape = window.innerWidth > window.innerHeight;
        whiteKeyHeight = isLandscape ? window.innerHeight * 0.18 : window.innerHeight * 0.12;
        whiteKeyWidth = canvas.width / totalVisibleWhiteKeys;
        blackKeyWidth = whiteKeyWidth * 0.65;
        blackKeyHeight = whiteKeyHeight * 0.65;
    }
    
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 300));
    resizeCanvas();

    function toggleUI() {
        const ui = document.getElementById('ui');
        const content = document.getElementById('ui-content');
        if(content.style.display === 'none') {
