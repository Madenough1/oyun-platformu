<!DOCTYPE html>
<html lang="tr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Oyun Platformu</title>
 <style>
 /* Genel Reset ve Tipografi */
 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
 }

 /* Modern Gradient Arka Plan */
 body {
 min-height: 100vh;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #6a0dad 100%);
 background-size: 200% 200%;
 animation: gradientBG 15s ease infinite;
 color: #ffffff;
 overflow-x: hidden;
 }

 /* Arka Plan Animasyonu */
 @keyframes gradientBG {
 0% { background-position: 0% 50%; }
 50% { background-position: 100% 50%; }
 100% { background-position: 0% 50%; }
 }

 /* Hero Bölümü */
 .hero {
 text-align: center;
 margin-bottom: 4rem;
 padding: 0 20px;
 animation: fadeInDown 1s ease-out;
 }

 .hero h1 {
 font-size: 4rem;
 font-weight: 800;
 margin-bottom: 1rem;
 text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
 letter-spacing: 2px;
 }

 .hero p {
 font-size: 1.5rem;
 opacity: 0.9;
 font-weight: 300;
 }

 /* Kart Konteyneri */
 .cards-container {
 display: flex;
 gap: 3rem;
 flex-wrap: wrap;
 justify-content: center;
 padding: 20px;
 width: 100%;
 max-width: 1000px;
 animation: fadeInUp 1s ease-out 0.3s both;
 }

 /* Glassmorphism Kart Tasarımı */
 .card {
 background: rgba(255, 255, 255, 0.1);
 backdrop-filter: blur(12px);
 -webkit-backdrop-filter: blur(12px);
 border: 1px solid rgba(255, 255, 255, 0.2);
 border-radius: 24px;
 padding: 3rem 2rem;
 width: 280px;
 height: 320px;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 text-decoration: none;
 color: white;
 transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
 box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
 position: relative;
 overflow: hidden;
 }

 /* Kart Hover Efekti */
 .card:hover {
 transform: translateY(-15px) scale(1.05);
 box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
 background: rgba(255, 255, 255, 0.15);
 border: 1px solid rgba(255, 255, 255, 0.4);
 }

 /* Kart İkonları */
 .icon {
 font-size: 6rem;
 margin-bottom: 1.5rem;
 filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
 transition: transform 0.3s ease;
 }

 .card:hover .icon {
 transform: scale(1.1) rotate(5deg);
 }

 /* Kart Metinleri */
 .card-title {
 font-size: 2rem;
 font-weight: 700;
 margin-bottom: 0.5rem;
 letter-spacing: 1px;
 }

 .card-subtitle {
 font-size: 1.1rem;
 opacity: 0.8;
 font-weight: 400;
 text-transform: uppercase;
 letter-spacing: 2px;
 }

 /* Animasyonlar */
 @keyframes fadeInDown {
 from { opacity: 0; transform: translateY(-30px); }
 to { opacity: 1; transform: translateY(0); }
 }

 @keyframes fadeInUp {
 from { opacity: 0; transform: translateY(30px); }
 to { opacity: 1; transform: translateY(0); }
 }

 /* Mobil Uyumluluk */
 @media (max-width: 768px) {
 .hero h1 {
 font-size: 3rem;
 }
 .hero p {
 font-size: 1.2rem;
 }
 .cards-container {
 gap: 2rem;
 }
 .card {
 width: 100%;
 max-width: 320px;
 height: 280px;
 }
 }
 </style>
</head>
<body>

 <div class="hero">
 <h1>🎮 Oyunlar</h1>
 <p>Eğlenceli oyunlar tek çatı altında</p>
 </div>

 <div class="cards-container">
 <a href="satranc.html" class="card">
 <span class="icon">♟️</span>
 <span class="card-title">Satranç</span>
 <span class="card-subtitle">Strateji Oyunu</span>
 </a>

 <a href="tavla.html" class="card">
 <span class="icon">🎲</span>
 <span class="card-title">Tavla</span>
 <span class="card-subtitle">Zar Oyunu</span>
 </a>
 </div>

</body>
</html>
