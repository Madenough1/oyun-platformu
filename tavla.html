<!DOCTYPE html>
<html lang="tr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Tavla - Yakında</title>
 <style>
 * { box-sizing: border-box; margin: 0; padding: 0; }
 body {
 min-height: 100vh;
 background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 font-family: 'Segoe UI', sans-serif;
 color: #fff;
 text-align: center;
 padding: 20px;
 }
 .dice { font-size: 100px; animation: bounce 2s infinite; }
 @keyframes bounce {
 0%, 100% { transform: translateY(0); }
 50% { transform: translateY(-20px); }
 }
 h1 { font-size: 2.5rem; margin: 30px 0 15px; }
 p { color: rgba(255,255,255,0.7); font-size: 1.2rem; margin-bottom: 30px; }
 .back-btn {
 padding: 15px 40px;
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
 color: #fff;
 border: none;
 border-radius: 50px;
 font-size: 1.1rem;
 cursor: pointer;
 text-decoration: none;
 transition: transform 0.3s, box-shadow 0.3s;
 }
 .back-btn:hover {
 transform: scale(1.05);
 box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
 }
 .note {
 margin-top: 40px;
 padding: 20px;
 background: rgba(255,255,255,0.1);
 border-radius: 15px;
 max-width: 500px;
 }
 .note h3 { color: #f7b733; margin-bottom: 10px; }
 .note p { font-size: 0.95rem; margin-bottom: 5px; }
 </style>
</head>
<body>
 <div class="dice">🎲</div>
 <h1>Tavla Oyunu</h1>
 <p>Yakında burada olacak...</p>
 <a href="index.html" class="back-btn">🏠 Ana Sayfaya Dön</a>
 <div class="note">
 <h3>📝 Not</h3>
 <p>Gemini'den tavla kodunu aldığında</p>
 <p>bu sayfa otomatik güncellenecek!</p>
 </div>
</body>
</html>
